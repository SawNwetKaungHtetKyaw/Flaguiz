name: flaguiz
description: "Flaguiz:Learning & Quiz"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  webview_flutter: ^4.10.0
  carousel_slider: ^5.1.1
  url_launcher: ^6.3.1
  rive: ^0.13.20
  video_player: ^2.9.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  dio: ^5.9.0
  firebase_core: ^4.3.0
  cloud_firestore: ^6.1.1
  just_audio: ^0.9.46
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon/app_icon.jpg"  

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/app_icon/
    - assets/images/achievements/
    - assets/images/buttons/
    - assets/images/back_key/
    - assets/images/backgrounds/
    - assets/images/others/
    - assets/audio/
    - assets/fonts/
    - assets/json/
    - assets/video/
    - assets/animation/


  fonts:
    - family: SupplyCenter
      fonts:
        - asset: assets/fonts/supply_center.ttf

